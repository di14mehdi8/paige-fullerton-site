<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 80" role="img" aria-label="eXp Realty">
  <title>eXp Realty</title>
  <g fill="currentColor">
    <!-- eXp wordmark: lowercase e, capital X, lowercase p -->
    <text x="0" y="46" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="54" font-weight="700" letter-spacing="-1">e<tspan dx="1">X</tspan><tspan dx="0">p</tspan></text>
    <!-- REALTY subtext -->
    <text x="2" y="72" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" font-weight="500" letter-spacing="5">REALTY</text>
  </g>
</svg>
